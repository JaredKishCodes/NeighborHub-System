<div class="auth-page" [class.dark]="darkMode">

  <!-- Theme Toggle -->
  <button class="theme-toggle" (click)="darkMode = !darkMode">
    {{ darkMode ? '☀ Light Mode' : '🌙 Dark Mode' }}
  </button>

  <div class="auth-container">

    <!-- LEFT SIDE -->
    <div class="auth-left">
      <div class="overlay">
        <h2>Welcome to NeighbourShare</h2>
        <p>
          Connect. Share. Support your community.
          Building stronger neighborhoods together.
        </p>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="auth-right">
      <div class="auth-card">

        <div class="auth-header">
          <h1>NeighbourShare Hub</h1>
        </div>

        <div class="auth-tabs">
          <button
            type="button"
            [class.active]="mode === 'login'"
            (click)="switchMode('login')"
          >Login</button>

          <button
            type="button"
            [class.active]="mode === 'register'"
            (click)="switchMode('register')"
          >Sign Up</button>

          <div class="tab-indicator" [class.right]="mode === 'register'"></div>
        </div>

        @if (error) {
          <div class="auth-error">{{ error }}</div>
        }

        @if (mode === 'login') {
          <form (ngSubmit)="submitLogin()" class="auth-form">

            <div class="floating-group">
              <input type="email" required
                name="loginEmail"
                [(ngModel)]="loginModel.email"
                placeholder=" " />
              <label>Email</label>
            </div>

            <div class="floating-group">
              <input type="password" required
                name="loginPassword"
                [(ngModel)]="loginModel.password"
                placeholder=" " />
              <label>Password</label>
            </div>

            <button class="primary-btn">
              {{ loading ? 'Logging in…' : 'Login' }}
            </button>

          </form>
        } @else {
          <form (ngSubmit)="submitRegister()" class="auth-form">

            <div class="grid-2">
              <div class="floating-group">
                <input type="text" required
                  name="firstName"
                  [(ngModel)]="registerModel.firstName"
                  placeholder=" " />
                <label>First Name</label>
              </div>

              <div class="floating-group">
                <input type="text" required
                  name="lastName"
                  [(ngModel)]="registerModel.lastName"
                  placeholder=" " />
                <label>Last Name</label>
              </div>
            </div>

            <div class="floating-group">
              <input type="text"
                name="streetAddress"
                [(ngModel)]="registerModel.streetAddress"
                placeholder=" " />
              <label>Street Address</label>
            </div>

            <div class="grid-2">
              <div class="floating-group">
                <input type="text"
                  name="city"
                  [(ngModel)]="registerModel.city"
                  placeholder=" " />
                <label>City</label>
              </div>

              <div class="floating-group">
                <input type="text"
                  name="baranggay"
                  [(ngModel)]="registerModel.baranggay"
                  placeholder=" " />
                <label>Baranggay</label>
              </div>
            </div>

            <div class="floating-group">
              <input type="email" required
                name="registerEmail"
                [(ngModel)]="registerModel.email"
                placeholder=" " />
              <label>Email</label>
            </div>

            <div class="grid-2">
              <div class="floating-group">
                <input type="password" required
                  name="registerPassword"
                  [(ngModel)]="registerModel.password"
                  placeholder=" " />
                <label>Password</label>
              </div>

              <div class="floating-group">
                <input type="password" required
                  name="confirmPassword"
                  [(ngModel)]="registerModel.confirmPassword"
                  placeholder=" " />
                <label>Confirm Password</label>
              </div>
            </div>

            <button class="primary-btn">
              {{ loading ? 'Creating…' : 'Create Account' }}
            </button>

          </form>
        }

        
      </div>
    </div>
  </div>
</div>
