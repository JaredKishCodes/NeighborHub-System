<div class="layout-container">
  <aside class="sidebar" [class.close]="sidebarClosed">
    <div class="logo-details">
      <span class="logo-icon-wrap" aria-hidden="true">
        <i class="bx bx-group logo-icon"></i>
      </span>
      <span class="logo_name text">NeighbourShare Hub</span>
    </div>

    <ul class="nav-links">
      <li>
        <a (click)="navigate('/dashboard')" 
           [routerLink]="['/dashboard']" 
           routerLinkActive="active" 
           style="cursor: pointer; position: relative; z-index: 1001;">
          <i class="bx bx-grid-alt"></i>
          <span class="link_name">Dashboard</span>
        </a>
      </li>

      <li>
        <a (click)="navigate('/item')" 
           [routerLink]="['/item']" 
           routerLinkActive="active" 
           style="cursor: pointer; position: relative; z-index: 1001;">
          <i class="bx bx-pie-chart-alt-2"></i>
          <span class="link_name">Items</span>
        </a>
      </li>

      <li>
        <a href="javascript:void(0)" (click)="onLogout($event)" style="position: relative; z-index: 1001;">
          <i class="bx bx-log-out"></i>
          <span class="link_name">Logout</span>
        </a>
      </li>
    </ul>
  </aside>

  <section class="home-section">
    <header class="home-content">
      <button type="button" class="sidebar-toggle-btn" (click)="toggleSidebar()" aria-label="Toggle sidebar">
        <i class="bx bx-menu"></i>
      </button>
    </header>

    
    <main class="content-wrapper">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
